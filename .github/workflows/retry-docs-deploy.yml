name: Retry failed Pages deploy

# actions/deploy-pages has a known, GitHub-side backend flakiness --
# intermittent "Deployment failed, try again later." reported on the very
# first status check after the deployment is created, unrelated to
# anything this repo controls. Confirmed by inspecting actual failed run
# logs: the "build" job in docs.yml (make docs / make coverage-html /
# assembling the Pages artifact) has never failed; only the separate
# deploy job's status poll to GitHub's own Pages backend fails, and it
# fails immediately (not after a long wait), so a longer timeout on our
# side wouldn't help -- see actions/deploy-pages#406 and
# github/community#200823 for other repos hitting the same thing with no
# known root cause. Manually re-running the failed job always fixes it,
# so this automates exactly that instead of waiting for a human to
# notice and click re-run.
on:
  workflow_run:
    workflows: ["Deploy docs + coverage to Pages"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry:
    # run_attempt < 3 caps this at two automatic retries (three attempts
    # total) so a genuine, non-transient failure doesn't loop forever.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Rerun failed jobs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run rerun "${{ github.event.workflow_run.id }}" \
            --repo "${{ github.repository }}" --failed
