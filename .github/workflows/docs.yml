name: Deploy docs + coverage to Pages

# Only deploys from main, so Pages always reflects the canonical branch;
# workflow_dispatch allows a manual re-run without needing a new push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment in flight at a time; don't cancel one that's
# already publishing partway through.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and lcov
        run: sudo apt-get update && sudo apt-get install -y doxygen lcov

      - name: Configure
        run: ./configure

      - name: Generate docs
        run: make docs

      - name: Generate coverage report
        run: make coverage-html

      # GitHub Pages serves one artifact tree per site, so both
      # generated reports are assembled under a single root before
      # upload: Doxygen at the site root (matching the existing
      # rfb3.github.io/robinhood/ link), lcov's HTML under /coverage/.
      - name: Assemble Pages site
        run: |
          mkdir -p pages-site
          cp -r docs/html/. pages-site/
          mkdir -p pages-site/coverage
          cp -r coverage-html/. pages-site/coverage/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
