name: Deploy docs + coverage to Pages

# Only deploys from main, so Pages always reflects the canonical branch;
# workflow_dispatch allows a manual re-run without needing a new push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment in flight at a time; don't cancel one that's
# already publishing partway through.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Doxygen and lcov
        run: sudo apt-get update && sudo apt-get install -y doxygen lcov

      - name: Configure
        run: ./configure

      - name: Generate docs
        run: make docs

      - name: Generate coverage report
        run: make coverage-html

      # GitHub Pages serves one artifact tree per site, so both
      # generated reports are assembled under a single root before
      # upload: Doxygen at the site root (matching the existing
      # rfb3.github.io/robinhood/ link), lcov's HTML under /coverage/.
      - name: Assemble Pages site
        run: |
          mkdir -p pages-site
          cp -r docs/html/. pages-site/
          mkdir -p pages-site/coverage
          cp -r coverage-html/. pages-site/coverage/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment1.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      # actions/deploy-pages has a known, GitHub-side backend flakiness --
      # intermittent "Deployment failed, try again later." on the very
      # first status check, unrelated to anything in this repo's own build
      # (see actions/deploy-pages#406, github/community#200823). A
      # separate workflow_run-triggered retry workflow was tried first and
      # dropped: re-running a workflow via the API/CLI does not generate a
      # new workflow_run event at all, so it could never have caught its
      # own follow-up retries even if the first one had fired reliably --
      # which, in practice across two real failures, it didn't. Retrying
      # in-job instead removes any dependency on a second workflow's
      # trigger firing at all. continue-on-error on the first two attempts
      # means their failure doesn't fail the job outright; the final
      # attempt has no continue-on-error, so the job only actually fails
      # if all three do.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment1.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment2
        if: steps.deployment1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retry
        if: >
          steps.deployment1.outcome == 'failure' &&
          steps.deployment2.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 3, final)
        id: deployment3
        if: >
          steps.deployment1.outcome == 'failure' &&
          steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v5
